services:
  db:
    image: postgres:16-alpine
    container_name: commercio-db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-commercio}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-commercio}
      POSTGRES_DB: ${POSTGRES_DB:-commercio}
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-commercio}"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: ./backend
    container_name: commercio-backend
    restart: unless-stopped
    env_file:
      - ./backend/.env
    environment:
      DATABASE_URL: postgresql+psycopg2://${POSTGRES_USER:-commercio}:${POSTGRES_PASSWORD:-commercio}@db:5432/${POSTGRES_DB:-commercio}
    ports:
      - "8000:8000"
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./backend:/app

  frontend:
    build:
      context: ./frontend
    container_name: commercio-frontend
    restart: unless-stopped
    env_file:
      - ./frontend/.env
    ports:
      - "5173:5173"
    depends_on:
      - backend
    volumes:
      - ./frontend:/app
      - /app/node_modules

volumes:
  postgres-data:
